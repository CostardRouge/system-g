# Configuration Nginx pour servir le site statique Système G (cible prod).
server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # URLs propres : /biographie sert /biographie/index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache long pour les assets versionnés d'Astro
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Page 404 générée par Astro
    error_page 404 /404.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
