# Orchestration locale — deux profils : développement et production.
#
#   Développement (hot reload) :
#     docker compose up dev          → http://localhost:4321
#
#   Production (build + Nginx) :
#     docker compose up prod --build → http://localhost:8080

services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "4321:4321"
    volumes:
      # Monte le code source pour le rechargement à chaud…
      - .:/app
      # …mais garde les node_modules du conteneur.
      - /app/node_modules
    environment:
      - NODE_ENV=development

  prod:
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
