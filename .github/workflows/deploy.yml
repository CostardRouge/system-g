name: Deploy to GitHub Pages

# Automatic deployment of the static Astro site to GitHub Pages,
# on every push to the main branch (and manually triggerable).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment run at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build
        env:
          # `configure-pages` provides the correct URL + base path
          # (custom domain via CNAME, or /<repo> for a project repo).
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload the artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
